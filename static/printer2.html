<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <title>Printer 2 - Prusa XL</title>
</head>

<body>
    <main>
        <h1>Printer 2 - Prusa XL</h1>
        <section class="two-column">
            <div>
                <p><strong>Printer Number:</strong> 2</p>
                <p><strong>Status:</strong> Inactive</p>
                <p><strong>Nozzle Temperature:</strong> <span id="temp-value">--</span> C</p>
                <p id="temp-updated">Waiting for live data...</p>
                <h2>Queue</h2>
                <ul>
                    <li>Diana</li>
                    <li>Evan</li>
                    <li>Fiona</li>
                </ul>
            </div>
            <img src="https://placecats.com/300/200" alt="Printer 2 image" />
        </section>
        <a class="button" href="/printers.html">Back to printers</a>
    </main>
    <script>
        const tempValue = document.getElementById("temp-value");
        const tempUpdated = document.getElementById("temp-updated");
        const stream = new EventSource("/api/printer/2/temperature/stream");

        stream.onmessage = (event) => {
            const payload = JSON.parse(event.data);
            if (typeof payload.temperature_c === "number") {
                tempValue.textContent = payload.temperature_c.toFixed(1);
                tempUpdated.textContent = `Last updated: ${new Date(payload.timestamp * 1000).toLocaleTimeString()}`;
            } else if (payload.error) {
                tempValue.textContent = "--";
                tempUpdated.textContent = `Unable to read temperature: ${payload.error}`;
            } else {
                tempValue.textContent = "--";
                tempUpdated.textContent = "No temperature field in API response";
            }
        };

        stream.onerror = () => {
            tempUpdated.textContent = "Temperature stream disconnected. Retrying...";
        };
    </script>
</body>

</html>
